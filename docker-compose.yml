version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: blocktask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://postgres:postgres@db:5432/blocktask
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-in-production
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://frontend:80
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  celery:
    build: ./backend
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://postgres:postgres@db:5432/blocktask
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - db
      - redis
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
